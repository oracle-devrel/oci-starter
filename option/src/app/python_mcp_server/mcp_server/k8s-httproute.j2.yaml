apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ##TF_VAR_prefix##-mcp-server-route
spec:
  parentRefs:
  - name: oke-gateway
{%- if tls == "new_http_01" %}
  hostnames:
  - "##TF_VAR_dns_name##"
{%- endif %}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /##TF_VAR_prefix##/mcp_server
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: ##TF_VAR_prefix##-mcp-server-service
      port: 2025